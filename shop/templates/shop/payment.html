<!DOCTYPE html>
<html>
<head>
    <title>Secure Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>

        body{
            margin:0;
            font-family:'Poppins',sans-serif;
            background:#f4f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .payment-box{
            width:420px;
            background:white;
            padding:35px;
            border-radius:22px;
            box-shadow:0 15px 40px rgba(0,0,0,0.08);
        }

        h1{
            margin-top:0;
            font-size:30px;
        }

        .amount{
            font-size:34px;
            font-weight:800;
            color:#16a34a;
            margin:15px 0;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:8px;
            font-weight:600;
        }

        select,input{
            width:100%;
            padding:14px;
            border-radius:12px;
            border:1px solid #d1d5db;
            font-size:15px;
        }

        .btn{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:#16a34a;
            color:white;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            margin-top:25px;
        }

        .btn:hover{
            background:#15803d;
        }

        .secure{
            text-align:center;
            margin-top:18px;
            color:#6b7280;
            font-size:14px;
        }

        .message{
            background:#fee2e2;
            color:#b91c1c;
            padding:12px;
            border-radius:10px;
            margin-bottom:15px;
            font-weight:600;
        }

    </style>
</head>

<body>

<div class="payment-box">

    <h1> Secure Payment</h1>

    <p>Order ID: #{{ order.id }}</p>

    <div class="amount">
        ₹{{ order.total_amount }}
    </div>

    <!-- ERROR MESSAGE -->
    {% if messages %}
        {% for message in messages %}
            <div class="message">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label>Select Payment Method</label>

        <select
            name="payment_method"
            id="payment_method"
            onchange="showFields()"
            required
        >

            <option value="">Choose Payment</option>

            <option value="UPI">UPI</option>

            <option value="CARD">Card</option>

            <option value="COD">Cash on Delivery</option>

        </select>

        <!-- UPI -->
        <div id="upiBox" style="display:none;">

            <label>Enter UPI ID</label>

            <input
                type="text"
                name="upi_id"
                placeholder="name@upi"
            >

        </div>

        <!-- CARD -->
        <div id="cardBox" style="display:none;">

            <label>Card Number</label>

            <input
                type="text"
                name="card_number"
                placeholder="1234 5678 9012 3456"
            >

            <label>CVV</label>

            <input
                type="password"
                name="cvv"
                placeholder="123"
            >

        </div>

        <button type="submit" class="btn">
             Pay Now
        </button>

    </form>

    <div class="secure">
         Your payment is secure and encrypted
    </div>

</div>

<script>

function showFields(){

    let method =
        document.getElementById("payment_method").value;

    document.getElementById("upiBox").style.display = "none";
    document.getElementById("cardBox").style.display = "none";

    if(method === "UPI"){

        document.getElementById("upiBox").style.display = "block";
    }

    else if(method === "CARD"){

        document.getElementById("cardBox").style.display = "block";
    }
}

</script>

</body>
</html>
