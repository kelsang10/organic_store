<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoAI Sustainability Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#052e16,#064e3b,#0f172a);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.chat-wrapper{
    width:100%;
    max-width:950px;
    height:90vh;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.header{
    background:rgba(0,0,0,0.2);
    padding:20px;
    text-align:center;
    color:white;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.header h2{
    font-size:24px;
}

.header p{
    font-size:13px;
    opacity:0.8;
    margin-top:5px;
}

.welcome-box{
    padding:20px;
    background:rgba(34,197,94,0.08);
    color:white;
    border-bottom:1px solid rgba(255,255,255,0.05);

    transition:all 0.4s ease;
}

.welcome-box h3{
    margin-bottom:10px;
}

.welcome-box ul{
    padding-left:20px;
    font-size:14px;
    line-height:1.8;
}

.quick-questions{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:15px;
    background:rgba(255,255,255,0.03);
}

.quick-btn{
    border:none;
    padding:10px 15px;
    border-radius:30px;
    cursor:pointer;
    background:#22c55e;
    color:white;
    font-size:13px;
    transition:.3s;
}

.quick-btn:hover{
    background:#16a34a;
    transform:translateY(-2px);
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    min-height:0;
}

.message{
    display:flex;
    margin-bottom:15px;
}

.user{
    justify-content:flex-end;
}

.ai{
    justify-content:flex-start;
}

.bubble{
    max-width:75%;
    padding:14px 18px;
    border-radius:18px;
    line-height:1.6;
    font-size:14px;
    word-wrap:break-word;
    overflow-wrap:break-word;
}

.user .bubble{
    background:#22c55e;
    color:white;
    border-bottom-right-radius:5px;
}

.ai .bubble{
    background:#1e293b;
    color:#f1f5f9;
    border-bottom-left-radius:5px;
}

.loading{
    font-style:italic;
    opacity:.8;
}

.input-area{
    padding:15px;
    display:flex;
    gap:10px;
    background:rgba(0,0,0,0.2);
    border-top:1px solid rgba(255,255,255,0.08);
    flex-shrink:0;
}

input{
    flex:1;
    border:none;
    outline:none;
    padding:14px;
    border-radius:12px;
    background:#1e293b;
    color:white;
}

button.send-btn{
    border:none;
    padding:14px 20px;
    border-radius:12px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-weight:600;
}

button.send-btn:hover{
    background:#16a34a;
}

.chat-box::-webkit-scrollbar{
    width:6px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:#22c55e;
    border-radius:10px;
}

@media(max-width:768px){

.chat-wrapper{
    width:100%;
    max-width:950px;
    height:90vh;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    display:flex;
    flex-direction:column;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.bubble{
    max-width:90%;
}

.quick-questions{
    flex-direction:column;
}

.quick-btn{
    width:100%;
}

}

</style>
</head>

<body>

<div class="chat-wrapper">

    <div class="header">
        <h2>🌱 EcoAI Sustainability Assistant</h2>
        <p>Promoting Sustainable Living Through Artificial Intelligence</p>
    </div>

    <div class="welcome-box">

    <h3>Welcome!</h3>

    <ul>
        <li>Learn about organic farming</li>
        <li>Reduce food waste</li>
        <li>Discover sustainable food choices</li>
        <li>Understand environmental impact</li>
    </ul>

    <div class="quick-questions">

        <button class="quick-btn"
            onclick="quickAsk('How can food waste be reduced?')">
            Food Waste Reduction
        </button>

        <button class="quick-btn"
            onclick="quickAsk('How does organic farming help the environment?')">
            Organic Farming
        </button>

        <button class="quick-btn"
            onclick="quickAsk('What are sustainable food choices?')">
            Sustainable Food
        </button>

        <button class="quick-btn"
            onclick="quickAsk('How can I reduce my carbon footprint?')">
            Carbon Footprint
        </button>

    </div>

</div>

<div id="chat-box" class="chat-box"></div>

    <div class="input-area">
        <input
            id="question"
            type="text"
            placeholder="Ask about sustainability, food waste, organic farming..."
        >

        <button class="send-btn" onclick="sendMessage()">
            Send
        </button>
    </div>

</div>

<script>

const CHAT_URL = "{% url 'agent_chat' %}";

function quickAsk(question){
    document.getElementById("question").value = question;
    sendMessage();
}

async function sendMessage() {

    let input = document.getElementById("question");
    let text = input.value.trim();

    if (!text) return;

    addMessage("user", text);
    input.value = "";

    const loadingId = addLoading();

    try {

        console.log("Sending to:", CHAT_URL);

        let response = await fetch(CHAT_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRFToken": getCSRFToken()
            },
            body: "question=" + encodeURIComponent(text)
        });

        console.log("Status:", response.status);

        let rawText = await response.text();

        console.log("Response:", rawText);

        let data = JSON.parse(rawText);

        removeLoading(loadingId);

        addMessage("ai", data.answer);
        setTimeout(() => {
        const chatBox = document.getElementById("chat-box");
        chatBox.scrollTop = chatBox.scrollHeight;
        }, 100);

        const welcomeBox = document.querySelector(".welcome-box");

        if (welcomeBox) {

        welcomeBox.style.opacity = "0";
        welcomeBox.style.maxHeight = "0";
        welcomeBox.style.padding = "0";

        setTimeout(() => {
        welcomeBox.remove();
        }, 400);
        }

    } catch (error) {

        console.error("Chat Error:", error);

        removeLoading(loadingId);

        addMessage("ai", "Error: " + error.message);
    }
}

function addMessage(role,text){

    let chatBox = document.getElementById("chat-box");

    let div = document.createElement("div");

    div.classList.add("message", role);

    div.innerHTML = `
        <div class="bubble">
            ${text}
        </div>
    `;

    chatBox.appendChild(div);

    // Auto-scroll to latest message
    chatBox.scrollTop = chatBox.scrollHeight;
}

function addLoading(){

    let chatBox=document.getElementById("chat-box");

    let div=document.createElement("div");

    const id="load-"+Date.now();

    div.id=id;

    div.classList.add("message","ai");

    div.innerHTML=`
        <div class="bubble loading">
            🌱 Searching sustainability knowledge base...
        </div>
    `;

    chatBox.appendChild(div);

    chatBox.scrollTop=chatBox.scrollHeight;

    return id;
}

function removeLoading(id){

    let element=document.getElementById(id);

    if(element){
        element.remove();
    }
}

function getCSRFToken(){

    let cookies=document.cookie.split(";");

    for(let c of cookies){

        if(c.trim().startsWith("csrftoken=")){

            return c.trim().split("=")[1];
        }
    }

    return "";
}

document.getElementById("question").addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        sendMessage();
    }
});

</script>

</body>
</html>
