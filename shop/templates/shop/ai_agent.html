<!DOCTYPE html>
<html>
<head>
    <title>AI Sustainability Chat</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            background: #111827;
        }

        .header {
            padding: 15px;
            text-align: center;
            background: #0b1220;
            color: white;
            font-weight: 600;
            border-bottom: 1px solid #1f2937;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            display: flex;
            margin-bottom: 12px;
        }

        .user {
            justify-content: flex-end;
        }

        .ai {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
        }

        .user .bubble {
            background: #22c55e;
            color: white;
            border-bottom-right-radius: 0;
        }

        .ai .bubble {
            background: #1f2937;
            color: #e5e7eb;
            border-bottom-left-radius: 0;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: #0b1220;
            border-top: 1px solid #1f2937;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #1f2937;
            color: white;
        }

        button {
            margin-left: 10px;
            padding: 12px 18px;
            background: #22c55e;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="chat-wrapper">

    <div class="header">
        🤖 AI Sustainability Chat Assistant
    </div>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
        <input id="question" type="text" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

const CHAT_URL = "{% url 'agent_chat' %}";

async function sendMessage() {

    let input = document.getElementById("question");
    let text = input.value.trim();

    if (!text) return;

    addMessage("user", text);

    input.value = "";

    let response = await fetch(CHAT_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCSRFToken()
        },
        body: "question=" + encodeURIComponent(text)
    });

    let data = await response.json();

    addMessage("ai", data.answer);
}

function addMessage(role, text) {

    let chatBox = document.getElementById("chat-box");

    let div = document.createElement("div");

    div.classList.add("message", role);

    div.innerHTML = `<div class="bubble">${text}</div>`;

    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
}

function getCSRFToken() {
    let cookies = document.cookie.split(";");
    for (let c of cookies) {
        if (c.trim().startsWith("csrftoken=")) {
            return c.trim().split("=")[1];
        }
    }
    return "";
}

</script>

</body>
</html>
