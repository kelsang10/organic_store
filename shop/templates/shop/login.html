<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Organic Store</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background:
                linear-gradient(135deg, rgba(34,197,94,0.85), rgba(59,130,246,0.85)),
                url("https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 45px 35px;
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.20),
                0 10px 20px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-size: 32px;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.30);
        }

        h1 {
            text-align: center;
            font-size: 34px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 30px;
        }

        form p {
            margin-bottom: 18px;
        }

        form label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        form input[type="text"],
        form input[type="password"] {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: 0.3s;
            background: #f9fafb;
        }

        form input:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.10);
            background: white;
        }

        .show-password {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: -5px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #4b5563;
        }

        .show-password input {
            width: auto;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.25);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(34, 197, 94, 0.35);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #6b7280;
        }

        .footer a {
            color: #16a34a;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .errorlist {
            list-style: none;
            color: #dc2626;
            font-size: 13px;
            margin-bottom: 6px;
            padding-left: 0;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
                border-radius: 22px;
            }

            h1 {
                font-size: 28px;
            }

            .logo {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="logo">🌿</div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Login to continue shopping fresh organic products</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="show-password">
            <input type="checkbox" id="showPassword" onclick="togglePassword()">
            <label for="showPassword">Show Password</label>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>
    </form>

    <div class="footer">
        Don't have an account?
        <a href="{% url 'register' %}">Create Account</a>
    </div>
</div>

<script>
function togglePassword() {
    const password = document.getElementById("id_password");

    if (password) {
        password.type = password.type === "password" ? "text" : "password";
    }
}
</script>

</body>
</html>
